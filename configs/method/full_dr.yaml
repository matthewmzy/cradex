# Full Domain Randomization Baseline
# ===================================
# Single-stage training with all DR axes enabled from the start.

num_iterations: 10000
num_steps: 16

# All DR axes enabled simultaneously
dr_axes:
  - "gravity_dir"
  - "gravity_mag"
  - "object_mass"
  - "friction"

ppo:
  lr: 3.0e-4
  clip_ratio: 0.2
  value_loss_coef: 0.5
  entropy_coef: 0.01
  max_grad_norm: 1.0
  num_epochs: 5
  mini_batch_size: 4096
  gamma: 0.99
  gae_lambda: 0.95
