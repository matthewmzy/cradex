# RMA Baseline (Rapid Motor Adaptation)
# ======================================
# Single adaptation encoder for ALL DR axes simultaneously.

num_iterations: 10000
num_steps: 16

# All DR axes enabled simultaneously (unified gravity axis)
dr_axes:
  - "gravity"
  - "object_mass"
  - "friction"

# RMA-specific
rma_latent_dim: 32       # single latent must encode everything
rma_encoder_hidden: 256
rma_window_size: 50

ppo:
  lr: 3.0e-4
  clip_ratio: 0.2
  value_loss_coef: 0.5
  entropy_coef: 0.01
  max_grad_norm: 1.0
  num_epochs: 5
  mini_batch_size: 4096
  gamma: 0.99
  gae_lambda: 0.95
